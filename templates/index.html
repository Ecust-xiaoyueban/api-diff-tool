<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统重构 API 比对工作台</title>
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar shadow-sm">
        <div class="nav-brand">🛠️ API Diff 工具平台</div>
        <button id="saveWorkspaceBtn" class="btn-secondary shadow-sm">💾 保存配置到本地</button>
    </nav>

    <div class="main-layout">
        <div class="sidebar panel shadow-md">
            <div class="workspace-manager">
                <div class="workspace-header"><span>🏢 当前测试组 (Workspace)</span></div>
                <div class="d-flex gap-1 mt-1">
                    <select id="groupSelect" class="workspace-select w-100" onchange="switchGroup()"></select>
                    <button onclick="openGroupModal()" class="btn-primary btn-add-group" title="新建测试组">➕</button>
                </div>
            </div>
            <div class="sidebar-header flex-column gap-1">
                <div class="d-flex justify-between w-100 align-items-center">
                    <span class="font-bold">📑 接口列表 (API)</span>
                    <button onclick="addCase()" class="btn-sm btn-outline-primary">+ 新增接口</button>
                </div>
                <div class="batch-controls d-flex justify-between align-items-center">
                    <label class="checkbox-label"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"> 全选</label>
                    <button onclick="openBatchModal('global')" class="btn-sm btn-success">⚙️ 批量执行</button>
                </div>
            </div>
            <div class="case-list" id="caseList"></div>
        </div>

        <div class="content d-flex flex-column gap-1">
            <div class="panel global-config shadow-sm">
                <div class="config-title">⚙️ 组全局环境前缀</div>
                <div class="form-row">
                    <div class="form-group"><label>🔵 老系统前缀</label><input type="text" id="oldPrefix" class="ide-input" placeholder="http://10.x.x.1:8080"></div>
                    <div class="form-group"><label>🟢 新系统前缀</label><input type="text" id="newPrefix" class="ide-input" placeholder="http://10.x.x.2:9090"></div>
                    <div class="form-group"><label class="text-muted">🚫 全局忽略字段</label><input type="text" id="ignorePaths" class="ide-input" placeholder="root['traceId']"></div>
                </div>
            </div>

            <div class="panel case-editor shadow-sm d-flex flex-column" id="caseEditor" style="display: none; flex: 1; overflow: hidden;">
                <div class="case-header-bar">
                    <div class="case-title-wrapper">
                        <span class="case-icon">🔌</span>
                        <input type="text" id="caseName" class="case-name-input" placeholder="请输入接口名称...">
                    </div>
                    <button id="runCaseBtn" class="btn-primary shadow-sm" onclick="openBatchModal('case')">▶️ 跑批当前接口</button>
                </div>

                <div class="api-config-section" style="padding: 1rem; border-bottom: 1px dashed var(--border); background: #fafafa;">
                    <div class="form-row">
                        <div class="form-group" style="flex: 0 0 110px;"><label>Method</label><select id="method" class="form-select ide-input"><option value="POST">POST</option><option value="GET">GET</option></select></div>
                        <div class="form-group" style="flex: 1;"><label>交易 URI</label><input type="text" id="uri" class="ide-input" placeholder="/api/v1/trade/query"></div>
                    </div>
                    <div class="form-row mt-1">
                        <div class="form-group" style="flex: 1;">
                            <div class="label-row"><label>Headers (本接口所有场景通用)</label><button class="btn-action" onclick="formatInput('headers')">🪄 格式化</button></div>
                            <textarea id="headers" class="ide-textarea textarea-sm"></textarea>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 6px;">
                                接口级高级设置
                                <label class="checkbox-label" style="margin:0; font-size: 0.75rem; background: #f1f5f9; padding: 4px 8px; border-radius: 4px; border: 1px solid #cbd5e1;">
                                    <input type="checkbox" id="isCaseIgnore" onchange="toggleCaseIgnore()"> 🔕 开启接口专属忽略
                                </label>
                            </label>
                            <input type="text" id="caseIgnorePaths" class="ide-input" style="display: none; height: 100%; border-color: #94a3b8; background: #fff;" placeholder="例如: root['taskNo'] (多个用逗号分隔)">
                        </div>
                    </div>
                </div>

                <div class="scenario-workbench d-flex flex-column flex-1 overflow-hidden">
                    <div class="workbench-header d-flex justify-between align-items-center">
                        <span class="font-bold text-primary">📦 报文测试场景集合 (Scenarios)</span>
                        <div>
                            <button class="btn-sm btn-outline-danger mr-1" onclick="clearResultsCache()" title="清理响应报文缓存，大幅减小配置文件体积">🧹 清理结果缓存</button>
                            <button class="btn-sm btn-outline-primary" onclick="addScenario()">➕ 新增场景</button>
                        </div>
                    </div>

                    <div class="scenario-tabs-container" id="scenarioTabs"></div>

                    <div id="scenarioEditor" class="split-view flex-1" style="background: #ffffff;">
                        <div class="split-pane">
                            <div class="form-group">
                                <label>当前场景名称</label>
                                <input type="text" id="scenarioName" class="ide-input" style="font-weight: bold; color: #0f172a; font-size: 1rem;" placeholder="例如：查询成功/余额不足">
                            </div>

                            <div class="form-group flex-1 d-flex flex-column">
                                <div class="label-row">
                                    <label style="display: flex; align-items: center; gap: 10px;">
                                        Payload 报文
                                        <label class="checkbox-label" style="margin:0; font-size: 0.75rem; background: #e0e7ff; padding: 2px 8px; border-radius: 4px; color: #4338ca;">
                                            <input type="checkbox" id="isDiffPayload" onchange="toggleDiffPayload()"> 🔀 差异化双发报文
                                        </label>
                                    </label>
                                    <button class="btn-action" onclick="formatAllPayloads()">🪄 格式化</button>
                                </div>
                                <div class="d-flex flex-column flex-1">
                                    <span id="oldPayloadLabel" style="font-size: 0.7rem; color: #3b82f6; display: none; margin-bottom: 2px;">🔵 发往老系统</span>
                                    <textarea id="payload" class="ide-textarea textarea-lg flex-1"></textarea>
                                </div>
                                <div id="newPayloadContainer" class="d-flex flex-column flex-1 mt-1" style="display: none;">
                                    <span style="font-size: 0.7rem; color: #10b981; margin-bottom: 2px;">🟢 发往新系统</span>
                                    <textarea id="payloadNew" class="ide-textarea textarea-lg flex-1" style="border-left: 3px solid #10b981;"></textarea>
                                </div>
                            </div>
                            <button id="runSingleScenarioBtn" class="btn-primary w-100 mt-1" onclick="runActiveScenario()">▶️ 单独执行此场景</button>
                        </div>

                        <div class="split-pane result-area shadow-inner">
                            <label class="text-danger d-flex align-items-center">📊 差异分析板 <span id="statusBadge" class="badge"></span></label>
                            <div id="diffResult" class="diff-visual-container" style="height: 180px;">等待执行...</div>

                            <div class="git-diff-container mt-1 shadow-sm flex-1 d-flex flex-column">
                                <div class="git-diff-header d-flex">
                                    <div class="flex-1">🔵 老系统响应 (Old)</div>
                                    <div class="flex-1">🟢 新系统响应 (New)</div>
                                </div>
                                <div id="unifiedGitDiff" class="git-view flex-1"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="panel empty-state shadow-sm" id="emptyState">👈 请在左侧选择或新建一个接口测试用例</div>
        </div>
    </div>

    <div id="groupModal" class="modal-overlay" style="display: none;"><div class="modal shadow-xl"><h3 class="modal-title">🏢 新建测试组</h3><div class="form-group mt-1"><label>组名称</label><input type="text" id="newGroupName" class="ide-input" placeholder="例如：核心交易测试组"></div><div class="d-flex justify-between mt-2"><button class="btn-secondary" style="width: 48%;" onclick="closeGroupModal()">取消</button><button class="btn-primary" style="width: 48%;" onclick="confirmCreateGroup()">✅ 创建</button></div></div></div>

    <div id="batchModal" class="modal-overlay" style="display: none;">
        <div class="modal shadow-xl" style="width: 480px;">
            <h3 class="modal-title">⚙️ 高级跑批配置</h3>
            <div class="form-group mt-1">
                <label>准备执行的场景总数</label>
                <input type="text" id="selectedCount" disabled class="ide-input bg-light disabled-input">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>⏳ 场景执行间隔 (毫秒)</label>
                    <input type="number" id="batchDelay" class="ide-input" value="500" min="0">
                </div>
                <div class="form-group">
                    <label>🔄 失败自动重试次数</label>
                    <input type="number" id="batchRetries" class="ide-input" value="0" min="0" max="5">
                </div>
            </div>
            <div class="form-group mt-1">
                <label class="checkbox-label text-danger" style="background: #fef2f2; padding: 10px; border-radius: 6px; border: 1px solid #fca5a5;">
                    <input type="checkbox" id="stopOnError" checked> ❌ 失败即熔断 (停止后续请求)
                </label>
            </div>
            <div class="d-flex justify-between mt-2">
                <button class="btn-secondary" style="width: 48%;" onclick="closeBatchModal()">取消</button>
                <button class="btn-success" style="width: 48%;" onclick="runBatch()">🚀 开始执行</button>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
